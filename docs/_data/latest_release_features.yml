current_release:
  label: "Current Release Features"
  description: "These guides map to the feature set currently highlighted in the app for end users."
  badge: "Shared in the app"
  slugs:
    - document-intelligence
    - cloud-anthropic-models
    - file-sync
    - group-workflows
    - source-review
    - analyze-compare
    - agent-knowledge-actions
    - generated-artifacts
    - chat-productivity
    - chat-upload-workspace-parity
    - workspace-experience
    - workflow-automation
    - visio-ingestion
    - stats-reporting

previous_release_groups:
  - label: "Previous Release Features"
    description: "The v0.241.001 through v0.241.008 guides remain available for reference."
    badge: "Previous release"
    release_version: "0.241.001 - 0.241.008"
    slugs:
      - guided-tutorials
      - background-chat
      - gpt-selection
      - tabular-analysis
      - citation-improvements
      - document-versioning
      - summaries-and-export
      - agent-operations
      - ai-transparency
      - fact-memory
      - deployment
      - redis-and-key-vault
      - send-feedback
      - support-menu
    highlights:
      - "Guided tutorials, background chat completion, and fact memory helped users onboard faster and carry useful context forward."
      - "GPT selection, citation improvements, document versioning, and tabular analysis made core chat and document workflows more transparent."
      - "Support Menu, Send Feedback, deployment guidance, and Redis/Key Vault setup improved the admin-to-user release communication loop."
  - label: "Earlier Release Features"
    description: "The v0.239.001 release guides remain available for longer-term archive reference."
    badge: "Earlier release"
    release_version: "0.239.001"
    slugs:
      - export-conversation
      - retention-policy
      - workspace-scope-lock
      - tags-grid-view-chat-filtering
    highlights:
      - "Owner-only group agent management lets admins restrict group agent and action edits to group owners."
      - "Multi-workspace scope management expanded grounded chat across personal, group, and public sources."
      - "Tag folders, grid view, and chat filtering shipped together as one broader workspace workflow upgrade."
    bug_fixes:
      - "Citation parsing fixes resolved edge cases where page range references failed to create the right clickable links."
      - "Public workspace activation fixed a 403 path for non-owner users activating a public workspace for chat."
lookup:
  document-intelligence:
    title: "Document Intelligence Auto Mode"
    description: "How Read, Layout, and Auto extraction help PDF and image uploads balance speed with richer structure"
    summary: "PDF and image uploads can now use Read, Layout, or Auto extraction, with workspace badges and PDF reprocessing actions for richer document structure when it is needed."
    why: "Teams can keep fast extraction for simple files while still capturing tables, forms, and selection marks when a document needs richer layout understanding."
    icon: "bi-file-earmark-richtext"
    accent: "blue"
    url: "/latest-release/document-intelligence/"
    release_label: "Admin Reference"
    image: "/images/latest-release/document_intelligence_admin_controls.png"
    image_alt: "Annotated Document Intelligence Auto Mode admin settings screenshot"
    images:
      - path: "/images/latest-release/document_intelligence_admin_controls.png"
        alt: "Annotated Document Intelligence Auto Mode admin settings screenshot"
        title: "Configure Document Intelligence Auto Mode"
        caption: "Numbers highlight extraction mode selection, Auto sample-page tuning, and where users review extraction badges or reprocess PDFs."
        label: "Admin Controls"
      - path: "/images/latest-release/document_intelligence_user_details.png"
        alt: "Annotated workspace document details screenshot showing extraction badges and Change Extraction actions"
        title: "Review Document Enrichment"
        caption: "Numbers highlight the document row, extraction and citation badges, and metadata or Change Extraction actions available to workspace users."
        label: "User Document Details"

  cosmos-autoscale:
    title: "Cosmos Throughput Autoscale"
    description: "How admins can monitor RU pressure, scale throughput, and convert eligible Cosmos resources to native autoscale"
    summary: "Admins can monitor Cosmos DB RU pressure, scale database or dedicated container throughput, enforce global policies, and convert eligible manual throughput to native autoscale."
    why: "Administrators can respond to capacity pressure without exposing Cosmos data-plane permissions to agents, actions, or end users."
    icon: "bi-speedometer2"
    accent: "emerald"
    url: "/latest-release/cosmos-autoscale/"
    release_label: "Current Release"
    image: "/images/latest-release/cosmos_autoscale_admin_controls.png"
    image_alt: "Annotated Cosmos throughput autoscale admin settings screenshot"
    images:
      - path: "/images/latest-release/cosmos_autoscale_admin_controls.png"
        alt: "Annotated Cosmos throughput autoscale admin settings screenshot"
        title: "Configure Cosmos Throughput Autoscale"
        caption: "Numbers highlight access validation, global scale-up and scale-down policy, and container-level guardrails for dedicated throughput."
        label: "Autoscale Controls"

  cloud-anthropic-models:
    title: "Cloud and Anthropic Model Support"
    description: "How admins can expose Azure OpenAI, Foundry, New Foundry, and Claude-capable model endpoints"
    summary: "Model endpoints now support Azure OpenAI, Foundry, New Foundry, cloud-aware authentication, and Claude deployments that route through the Anthropic messages protocol."
    why: "Teams can adopt Anthropic models through approved Azure AI Foundry endpoints without building a separate chat experience or losing existing model-governance controls."
    icon: "bi-cloud-check"
    accent: "violet"
    url: "/latest-release/cloud-anthropic-models/"
    release_label: "Current Release"
    image: "/images/latest-release/model_selection_multi_endpoint_admin.png"
    image_alt: "Admin multi-endpoint model management screenshot showing provider choices and configured models"
