# Site settings
title: Simple Chat Documentation
email: simplechat@microsoft.com
description: >-
  Documentation for Simple Chat - a comprehensive, web-based platform for secure
  and context-aware interactions with generative AI models using Azure OpenAI
  and Retrieval-Augmented Generation (RAG) capabilities.
baseurl: "/simplechat"   # adjust if your site lives under a subpath
url: "https://microsoft.github.io"  # replace if using a custom domain
lang: en

# Theme configuration (using local theme files)
# remote_theme: olivier3lanc/Jekyll-LibDoc  # Disabled - using custom theme

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# Permalinks (pretty URLs)
permalink: pretty

# Site branding
logo:
  light_url: /images/logo-lightmode.png
  dark_url: /images/logo-darkmode.png
title_hidden: false
favicon: /images/favicon.ico

# GitHub integration
github:
  repository_url: https://github.com/microsoft/simplechat
  repository_name: microsoft/simplechat

# Contact information
contact:
  enabled: true
  email: simplechat@microsoft.com

# Classification banner (optional)
classification_banner:
  enabled: false
  text: ""
  color: "#ffc107"

# Navigation configuration
navigation:
  show_sections: true
  main_links:
    - title: Guide
      url: /tutorials/
      match: /tutorials/
      icon: bi bi-signpost-split
    - title: API
      url: /reference/api_reference/
      match: /reference/
      icon: bi bi-braces
    - title: Examples
      url: /explanation/scenarios/
      match: /explanation/scenarios/
      icon: bi bi-collection-play
    - title: Changelog
      url: /explanation/release_notes/
      match: /explanation/release_notes/
      icon: bi bi-clock-history
  sidebar_sections:
    - title: Start here
      links:
        - title: Overview
          url: /
          icon: bi bi-house-fill
        - title: Getting Started
          url: /setup_instructions/
          icon: bi bi-rocket-takeoff
        - title: Feature Map
          url: /features/
          icon: bi bi-stars
        - title: Latest Release
          url: /latest-release/
          match: /latest-release/
          icon: bi bi-megaphone
        - title: FAQ
          url: /faqs/
          icon: bi bi-question-circle
    - title: Learn the product
      links:
        - title: Tutorials
          url: /tutorials/
          match: /tutorials/
          icon: bi bi-mortarboard
        - title: Application Workflows
          url: /application_workflows/
          icon: bi bi-diagram-3
        - title: Add Documents
          url: /how-to/add_documents/
          icon: bi bi-file-earmark-arrow-up
        - title: Create Agents
          url: /how-to/create_agents/
          icon: bi bi-robot
        - title: Solution Demos
          url: /demos/
          icon: bi bi-play-circle
    - title: Operate on Azure
      links:
        - title: Admin Configuration
          url: /admin_configuration/
          icon: bi bi-sliders
        - title: Admin UI Settings
          url: /how-to/admin_ui_settings/
          icon: bi bi-palette
        - title: Deployment Reference
          url: /reference/deploy/
          match: /reference/deploy/
          icon: bi bi-cloud-arrow-up
        - title: Application Scaling
          url: /application_scaling/
          icon: bi bi-speedometer2
        - title: Enterprise Networking
          url: /how-to/enterprise_networking/
          icon: bi bi-diagram-2
        - title: Troubleshooting
          url: /troubleshooting/
          icon: bi bi-wrench-adjustable-circle
    - title: Extend and integrate
      links:
        - title: External Applications
          url: /external_apps_overview/
          icon: bi bi-window-stack
        - title: ServiceNow Guides
          url: /how-to/agents/ServiceNow/
          match: /how-to/agents/ServiceNow/
          icon: bi bi-plug
        - title: Managed Identity
          url: /how-to/use_managed_identity/
          icon: bi bi-person-badge
        - title: API Reference
          url: /reference/api_reference/
          icon: bi bi-braces
        - title: Feature Reference
          url: /reference/features/
          icon: bi bi-grid-1x2
    - title: Deep reference
      links:
        - title: Architecture
          url: /explanation/architecture/
          icon: bi bi-diagram-3
        - title: Design Principles
          url: /explanation/design_principles/
          icon: bi bi-lightbulb
        - title: Feature Guidance
          url: /explanation/feature_guidance/
          icon: bi bi-signpost
        - title: Release Notes
          url: /explanation/release_notes/
          icon: bi bi-clock-history
        - title: Contributing
          url: /contributing/
          icon: bi bi-git
  external_links:
    - title: GitHub Repository
      url: https://github.com/microsoft/simplechat
      icon: bi bi-github
    - title: Contact
      url: mailto:simplechat@microsoft.com
      icon: bi bi-envelope me-2
  external_links_force_menu: false
  external_links_menu_name: "External Links"

# Build settings
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  tutorials:
    output: true
    permalink: /:collection/:name/
  how-to:
    output: true
    permalink: /:collection/:name/
  reference:
    output: true
    permalink: /:collection/:name/
  explanation:
    output: true
    permalink: /:collection/:name/

# Default layouts and settings
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      show_nav: true
  - scope:
      path: ""
      type: "posts"
    values:
      layout: page
      show_nav: true
  - scope:
      path: "tutorials"
      type: "tutorials"
    values:
      layout: page
      section: "tutorials"
      show_nav: true
  - scope:
      path: "how-to"
      type: "how-to"
    values:
      layout: page
      section: "how-to"
      show_nav: true
  - scope:
      path: "reference"
      type: "reference"
    values:
      layout: page
      section: "reference"
      show_nav: true
  - scope:
      path: "explanation"
      type: "explanation"
    values:
      layout: page
      section: "explanation"
      show_nav: true

# Exclude from processing
exclude:
  - _site/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/