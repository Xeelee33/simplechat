services:
  simplechat:
    build:
      context: .
      dockerfile: application/single_app/Dockerfile
    image: simplechat:local
    volumes:
      - ./application/single_app/.env:/app/.env:ro
    environment:
      FLASK_DEBUG: "0"
      PORT: "5000"
      FORCE_KEY_AUTH_FOR_LOCAL_DOCKER: "1"
    ports:
      - "5000:5000"
